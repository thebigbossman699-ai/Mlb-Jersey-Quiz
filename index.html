<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at center, #002554 0%, #000d1f 100%);
            color: white;
            font-family: 'Roboto Condensed', sans-serif;
            display: flex;
            justify-content: center;
            padding: 15px;
            min-height: 100vh;
        }
       .container { max-width: 480px; width: 100%; }
        header { border-bottom: 4px solid white; padding-bottom: 8px; margin-bottom: 15px; }
       .gtp { font-size: 0.55rem; font-weight: 700; letter-spacing: 1.5px; opacity: 0.5; margin-bottom: 2px; }
        h1 { font-family: 'Anton', sans-serif; font-size: 3.4rem; font-weight: 400; letter-spacing: 1px; line-height: 0.95; }
       .subtitle { font-size: 0.85rem; font-weight: 700; letter-spacing: 1.2px; margin-top: 1px; }
        #diamond { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1; margin: 25px auto; }
       .diamond-lines { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
       .pos {
            position: absolute;
            width: 74px;
            height: 74px;
            background: radial-gradient(circle at 35% 35%, #888 0%, #1a1a1a 70%);
            border: 4px solid white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
       .pos.label { font-family: 'Anton', sans-serif; font-size: 0.75rem; letter-spacing: 1px; line-height: 1; margin-bottom: 3px; }
       .pos.number { font-family: 'Anton', sans-serif; font-size: 2.1rem; line-height: 1; }
       .team.number { font-size: 3rem; }
       .cf { top: 0%; left: 50%; transform: translateX(-50%); }
       .lf { top: 17%; left: 0%; }
       .rf { top: 17%; right: 0%; }
       .ss { top: 37%; left: 17%; }
       .b2 { top: 37%; right: 17%; }
       .b3 { top: 57%; left: -2%; }
       .ace { top: 50%; left: 50%; transform: translate(-50%, -50%); }
       .b1 { top: 57%; right: -2%; }
       .dh { bottom: 0%; left: 0%; }
       .c { bottom: 0%; left: 50%; transform: translateX(-50%); }
       .team { bottom: 0%; right: 0%; }
       .b3,.b1 { flex-direction: row; gap: 8px; }
       .b3.side { order: -1; margin: 0; }
       .b1.side { margin: 0; }
       .label.side { font-size: 1rem; }
       .controls { display: flex; gap: 12px; justify-content: center; margin: 25px 0; }
        button {
            background: white; color: #00102a; border: none; padding: 12px 20px;
            font-family: 'Anton', sans-serif; font-size: 1rem; letter-spacing: 1px; cursor: pointer;
        }
        button:active { transform: scale(0.96); }
        #answer { margin-top: 20px; padding: 20px; background: #000a1a; border: 3px solid white; }
        #answer.hidden { display: none; }
        #team-name { font-family: 'Anton', sans-serif; font-size: 2rem; margin-bottom: 15px; letter-spacing: 1px; }
        #roster { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: left; font-size: 0.85rem; }
       .roster-item { background: #00102a; padding: 10px; border: 1px solid #ffffff40; }
       .roster-item strong { color: #5eb3ff; font-family: 'Anton', sans-serif; }
        @media (max-width: 500px) {
            h1 { font-size: 2.8rem; }
           .pos { width: 64px; height: 64px; border-width: 3px; }
           .pos.number { font-size: 1.7rem; }
            #roster { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="gtp">GUESS THE PLAYER</div>
            <h1>GUESS THE TEAM</h1>
            <p class="subtitle">BY THEIR JERSEY NUMBERS</p>
        </header>
        <div id="diamond">
            <svg class="diamond-lines" viewBox="0 0 400 400">
                <path d="M200 360 L40 200 L200 40 L360 200 Z" fill="none" stroke="white" stroke-width="6"/>
                <path d="M200 350 L50 200 L200 50 L350 200 Z" fill="none" stroke="white" stroke-width="3"/>
                <polygon points="200,165 215,180 200,195 185,180" fill="white"/>
            </svg>
            <div class="pos cf"><span class="label">CF</span><span class="number" id="cf-num">?</span></div>
            <div class="pos lf"><span class="label">LF</span><span class="number" id="lf-num">?</span></div>
            <div class="pos rf"><span class="label">RF</span><span class="number" id="rf-num">?</span></div>
            <div class="pos ss"><span class="label">SS</span><span class="number" id="ss-num">?</span></div>
            <div class="pos b2"><span class="label">2B</span><span class="number" id="b2-num">?</span></div>
            <div class="pos b3"><span class="label side">3B</span><span class="number" id="b3-num">?</span></div>
            <div class="pos ace"><span class="label">ACE</span><span class="number" id="ace-num">?</span></div>
            <div class="pos b1"><span class="number" id="b1-num">?</span><span class="label side">1B</span></div>
            <div class="pos dh"><span class="label">DH</span><span class="number" id="dh-num">?</span></div>
            <div class="pos c"><span class="label">C</span><span class="number" id="c-num">?</span></div>
            <div class="pos team"><span class="label">TEAM</span><span class="number" id="team-num">?</span></div>
        </div>
        <div class="controls">
            <button id="reveal-btn">REVEAL ANSWER</button>
            <button id="new-btn">NEW RANDOM TEAM</button>
        </div>
        <div id="answer" class="hidden">
            <h2 id="team-name"></h2>
            <div id="roster"></div>
        </div>
    </div>

    <script>
        const teams = [
            {
                name: "Los Angeles Dodgers",
                roster: [
                    { pos: "cf", number: 25, player: "Tommy Edman", label: "CF" },
                    { pos: "lf", number: 37, player: "Teoscar Hernández", label: "LF" },
                    { pos: "rf", number: 23, player: "Kyle Tucker", label: "RF" },
                    { pos: "ss", number: 50, player: "Mookie Betts", label: "SS" },
                    { pos: "b2", number: 13, player: "Max Muncy", label: "2B" },
                    { pos: "b3", number: 5, player: "Freddie Freeman", label: "3B" },
                    { pos: "ace", number: 17, player: "Shohei Ohtani", label: "ACE" },
                    { pos: "b1", number: 44, player: "Andy Pages", label: "1B" },
                    { pos: "dh", number: 17, player: "Shohei Ohtani", label: "DH" },
                    { pos: "c", number: 68, player: "Dalton Rushing", label: "C" }
                ]
            },
            {
                name: "San Diego Padres",
                roster: [
                    { pos: "cf", number: 3, player: "Jackson Merrill", label: "CF" },
                    { pos: "lf", number: 41, player: "Miguel Andujar", label: "LF" },
                    { pos: "rf", number: 23, player: "Fernando Tatis Jr.", label: "RF" },
                    { pos: "ss", number: 2, player: "Xander Bogaerts", label: "SS" },
                    { pos: "b2", number: 9, player: "Jake Cronenworth", label: "2B" },
                    { pos: "b3", number: 13, player: "Manny Machado", label: "3B" },
                    { pos: "ace", number: 38, player: "JP Sears", label: "ACE" },
                    { pos: "b1", number: 25, player: "Ty France", label: "1B" },
                    { pos: "dh", number: 30, player: "Gavin Sheets", label: "DH" },
                    { pos: "c", number: 12, player: "Luis Campusano", label: "C" }
                ]
            },
            {
                name: "Detroit Tigers",
                roster: [
                    { pos: "cf", number: 31, player: "Riley Greene", label: "CF" },
                    { pos: "lf", number: 30, player: "Kerry Carpenter", label: "LF" },
                    { pos: "rf", number: 43, player: "James Outman", label: "RF" },
                    { pos: "ss", number: 7, player: "Kevin McGonigle", label: "SS" },
                    { pos: "b2", number: 33, player: "Colt Keith", label: "2B" },
                    { pos: "b3", number: 39, player: "Zach McKinstry", label: "3B" },
                    { pos: "ace", number: 12, player: "Casey Mize", label: "ACE" },
                    { pos: "b1", number: 20, player: "Spencer Torkelson", label: "1B" },
                    { pos: "dh", number: 8, player: "Matt Vierling", label: "DH" },
                    { pos: "c", number: 13, player: "Dillon Dingler", label: "C" }
                ]
            }
        ];

        let currentTeam = null;

        function getRandomTeam() {
            const randomIndex = Math.floor(Math.random() * teams.length);
            return teams[randomIndex];
        }

        function loadTeam(team) {
            currentTeam = team;
            team.roster.forEach(player => {
                const numElement = document.getElementById(`${player.pos}-num`);
                if (numElement) numElement.textContent = player.number;
            });
            document.getElementById('team-num').textContent = '?';
            document.getElementById('answer').classList.add('hidden');
        }

        function revealAnswer() {
            if (!currentTeam) return;
            document.getElementById('team-num').textContent = currentTeam.name.split(' ').pop().substring(0, 3).toUpperCase();
            const answerDiv = document.getElementById('answer');
            const teamNameEl = document.getElementById('team-name');
            const rosterEl = document.getElementById('roster');
            teamNameEl.textContent = currentTeam.name;
            rosterEl.innerHTML = '';
            currentTeam.roster.forEach(player => {
                const div = document.createElement('div');
                div.className = 'roster-item';
                div.innerHTML = `<strong>${player.label} ${player.number}</strong> - ${player.player}`;
                rosterEl.appendChild(div);
            });
            answerDiv.classList.remove('hidden');
        }

        document.getElementById('reveal-btn').addEventListener('click', revealAnswer);
        document.getElementById('new-btn').addEventListener('click', () => {
            loadTeam(getRandomTeam());
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadTeam(getRandomTeam());
        });
    </script>
</body>
</html>
