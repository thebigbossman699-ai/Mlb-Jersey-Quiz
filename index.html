<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MLB Team Guess</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>MLB Team Guess</h1>

<div class="game">

    <div class="field">

       <div class="position sp"><span id="SP">00</span><small>SP</small></div>
<div class="position catcher"><span id="C">00</span><small>C</small></div>
<div class="position first"><span id="1B">00</span><small>1B</small></div>
<div class="position second"><span id="2B">00</span><small>2B</small></div>
<div class="position third"><span id="3B">00</span><small>3B</small></div>
<div class="position ss"><span id="SS">00</span><small>SS</small></div>

<div class="position lf"><span id="LF">00</span><small>LF</small></div>
<div class="position cf"><span id="CF">00</span><small>CF</small></div>
<div class="position rf"><span id="RF">00</span><small>RF</small></div>

<div class="position dh"><span id="DH">00</span><small>DH</small></div>
        </div>

    </div>


    <h2 id="playerName">
        Player
    </h2>


    <input 
        id="guessInput"
        placeholder="Guess the MLB team"
    >


    <button onclick="checkGuess()">
        Submit
    </button>


    <p id="message"></p>

    <p id="score">
        Score: 0
    </p>

    <p id="progressText"></p>

</div>


<script src="players.js"></script>
<script src="script.js"></script>

</body>
</html>
