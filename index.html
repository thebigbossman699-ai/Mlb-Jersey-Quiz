<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Team</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="gtp">GUESS THE PLAYER</div>
            <h1>GUESS THE TEAM</h1>
            <p class="subtitle">BY THEIR JERSEY NUMBERS</p>
        </header>

        <div id="diamond">
            <svg class="diamond-lines" viewBox="0 0 400 400">
                <path d="M200 360 L40 200 L200 40 L360 200 Z" fill="none" stroke="white" stroke-width="6"/>
                <path d="M200 350 L50 200 L200 50 L350 200 Z" fill="none" stroke="white" stroke-width="3"/>
                <polygon points="200,165 215,180 200,195 185,180" fill="white"/>
            </svg>

            <div class="pos cf">
                <span class="label">CF</span>
                <span class="number" id="cf-num">25</span>
            </div>
            <div class="pos lf">
                <span class="label">LF</span>
                <span class="number" id="lf-num">9</span>
            </div>
            <div class="pos rf">
                <span class="label">RF</span>
                <span class="number" id="rf-num">15</span>
            </div>
            <div class="pos ss">
                <span class="label">SS</span>
                <span class="number" id="ss-num">4</span>
            </div>
            <div class="pos b2">
                <span class="label">2B</span>
                <span class="number" id="b2-num">2</span>
            </div>
            <div class="pos b3">
                <span class="label side">3B</span>
                <span class="number" id="b3-num">22</span>
            </div>
            <div class="pos ace">
                <span class="label">ACE</span>
                <span class="number" id="ace-num">41</span>
            </div>
            <div class="pos b1">
                <span class="number" id="b1-num">23</span>
                <span class="label side">1B</span>
            </div>
            <div class="pos dh">
                <span class="label">DH</span>
                <span class="number" id="dh-num">56</span>
            </div>
            <div class="pos c">
                <span class="label">C</span>
                <span class="number" id="c-num">27</span>
            </div>
            <div class="pos team">
                <span class="label">TEAM</span>
                <span class="number" id="team-num">?</span>
            </div>
        </div>

        <div class="controls">
            <button id="reveal-btn">REVEAL ANSWER</button>
            <button id="new-btn">NEW RANDOM TEAM</button>
        </div>

        <div id="answer" class="hidden">
            <h2 id="team-name"></h2>
            <div id="roster"></div>
        </div>
    </div>

    <script src="teams.js"></script>
    <script src="quiz.js"></script>
</body>
</html>
