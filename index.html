<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MLB Team Guess</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>MLB Team Guess</h1>

<div class="game">

    <div class="field">

        <div class="position sp">
            <small>SP</small>
            <span id="sp">0</span>
        </div>

        <div class="position c">
            <small>C</small>
            <span id="c">0</span>
        </div>

        <div class="position first">
            <small>1B</small>
            <span id="first">0</span>
        </div>

        <div class="position second">
            <small>2B</small>
            <span id="second">0</span>
        </div>

        <div class="position third">
            <small>3B</small>
            <span id="third">0</span>
        </div>

        <div class="position short">
            <small>SS</small>
            <span id="short">0</span>
        </div>

        <div class="position left">
            <small>LF</small>
            <span id="left">0</span>
        </div>

        <div class="position center">
            <small>CF</small>
            <span id="center">0</span>
        </div>

        <div class="position right">
            <small>RF</small>
            <span id="right">0</span>
        </div>

        <div class="position dh">
            <small>DH</small>
            <span id="dh">0</span>
        </div>

    </div>


    <h2 id="playerName">
        Player
    </h2>


    <input 
        id="guessInput"
        placeholder="Guess the MLB team"
    >


    <button onclick="checkGuess()">
        Submit
    </button>


    <p id="message"></p>

    <p id="score">
        Score: 0
    </p>

    <p id="progressText"></p>

</div>


<script src="players.js"></script>
<script src="script.js"></script>

</body>
</html>
